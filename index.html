<!DOCTYPE html>

    <div class="top-actions">
      <button class="premium-top" onclick="showTool('premium')">👑 Premium</button>
      <button class="circle-btn notif" title="Notifications">🔔<span>3</span></button>
      <div class="user-menu" id="userMenu">

          <span class="avatar" id="headerAvatar">G</span>
          <span class="user-lines"><b id="headerUserName">Guest User</b><small id="headerUserPlan">Login required</small></span>

        <div class="user-dropdown" id="userDropdown">

          <button onclick="showTool('workspace')">📁 My Workspace</button>
          <button onclick="showTool('settings')">⚙️ Settings</button>

        </div>
      </div>
    </div>
  </header>

  <div class="app-shell">

      <div class="menu-label">MAIN MENU</div>
      <button class="nav-item active" data-tool="home">⌂ Home</button>

      <button class="nav-item protected" data-tool="documentStudio">▤ Document Studio <span class="protected-badge">Login</span></button>
      <button class="nav-item protected" data-tool="pdfStudio">▧ PDF Studio <span class="protected-badge">Login</span></button>
      <button class="nav-item" data-tool="feedback">? Feedback</button>
      <button class="nav-item" data-tool="login">🔐 Login / Sign Up</button>
    </aside>

    <main class="main">
      <section id="workspace" class="workspace"></section>
    </main>
  </div>


  <footer class="site-footer" id="siteFooter">
    <div class="footer-links">
      <button onclick="showFooterPage('about')">About Us</button>
      <button onclick="showFooterPage('contact')">Contact Us</button>
      <button onclick="showFooterPage('privacy')">Privacy Policy</button>
      <button onclick="showFooterPage('terms')">Terms & Conditions</button>
      <button onclick="showFooterPage('refund')">Refund Policy</button>
      <button onclick="showFooterPage('help')">Help Center</button>
      <button onclick="showTool('feedback')">Feedback</button>
